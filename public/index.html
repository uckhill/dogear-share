<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">DögEar</title>

  <!-- Social sharing meta tags -->
  <meta property="og:title" content="Check out my DögEar 🐶" id="og-title">
  <meta property="og:description" content="Videos I saved today" id="og-description">
  <meta property="og:image" content="https://dogearhq.com/dogear-share-preview.png" id="og-image">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Check out my DögEar 🐶" id="twitter-title">
  <meta name="twitter:description" content="Videos I saved today" id="twitter-description">
  <meta name="twitter:image" content="https://dogearhq.com/dogear-share-preview.png" id="twitter-image">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #9AD5B3;
      margin: 0;
      padding: 0;
    }
    
    /* Header */
    .header {
      background: #9AD5B3;
      padding: 60px 20px 30px 20px;
      text-align: center;
    }
    
    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 15px;
    }
    
    .profile-pic {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid white;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    
    .username {
      color: white;
      font-size: 17px;
      font-weight: bold;
      letter-spacing: -0.3px;
    }
    
    .video-count-badge {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    /* Feed Container */
    .feed-container {
      background: white;
      min-height: 100vh;
      padding: 16px 16px 100px 16px;
    }
    
    /* Video Card */
    .video-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s;
    }
    
    .video-card:active {
      transform: scale(0.98);
    }
    
    .video-thumbnail {
      width: 100%;
      aspect-ratio: 9 / 16;
      object-fit: cover;
      background: #f0f0f0;
      display: block;
    }
    
    .placeholder-thumbnail {
      width: 100%;
      aspect-ratio: 9 / 16;
      background: linear-gradient(135deg, #9AD5B3 0%, #7EC4A6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
    }
    
    .video-info {
      padding: 16px;
    }
    
    .video-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }
    
    .platform-badge {
      background: black;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    
    .video-title {
      font-size: 15px;
      font-weight: 500;
      color: #111827;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    
    .video-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #6B7280;
      font-size: 13px;
    }
    
    .watch-btn {
      display: block;
      width: 100%;
      background: #9AD5B3;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      margin-top: 12px;
      transition: background 0.2s;
    }
    
    .watch-btn:hover {
      background: #7EC4A6;
    }
    
    /* Footer CTA */
    .footer-cta {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      padding: 16px;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
      z-index: 100;
    }
    
    .cta-button {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #9AD5B3 0%, #7EC4A6 100%);
      color: white;
      border: none;
      padding: 18px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: transform 0.2s;
      box-shadow: 0 4px 20px rgba(154, 213, 179, 0.3);
    }
    
    .cta-button:hover {
      transform: translateY(-2px);
    }
    
    /* Loading & Error States */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: white;
      font-size: 18px;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 16px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .error {
      text-align: center;
      color: white;
      background: rgba(239, 68, 68, 0.2);
      padding: 40px 20px;
      border-radius: 12px;
      margin: 20px;
    }
    
    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <!-- Loading State -->
  <div id="loading">
    <div class="header">
      <div class="spinner"></div>
      <p class="loading">Loading DögEar...</p>
    </div>
  </div>

  <!-- Error State -->
  <div id="error" class="error" style="display: none;">
    <div class="error-icon">❌</div>
    <p id="error-message">Failed to load DögEar</p>
  </div>

  <!-- Content -->
  <div id="content" style="display: none;">
    <!-- Header -->
    <div class="header">
      <svg class="logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" fill="white"/>
        <path d="M35 40 Q35 30 45 30 L55 30 Q65 30 65 40 L65 65 Q65 75 55 75 L45 75 Q35 75 35 65 Z" fill="#0F172A"/>
        <circle cx="42" cy="45" r="4" fill="white"/>
        <circle cx="58" cy="45" r="4" fill="white"/>
        <path d="M40 60 Q50 65 60 60" stroke="#0F172A" stroke-width="3" stroke-linecap="round" fill="none"/>
      </svg>
      
      <div class="user-info">
        <div class="profile-pic" id="profile-pic">🐕</div>
        <span class="username" id="username">@dogearhq</span>
      </div>
      
      <div class="video-count-badge">
        <span>📹</span>
        <span id="video-count">0/10</span>
      </div>
    </div>

    <!-- Feed -->
    <div class="feed-container" id="feed">
      <!-- Video cards will be inserted here -->
    </div>

    <!-- Footer CTA -->
    <div class="footer-cta">
      <a href="#" class="cta-button" id="cta-button" target="_blank">
        Get DögEar 🐶
      </a>
    </div>
  </div>

  <script>
    const API_URL = 'https://api.dogearhq.com';
    let shareCode = '';
    
    console.log('🔍 Script loaded');
    console.log('🔍 Current URL:', window.location.href);
    
    // Get share code from URL
    const pathParts = window.location.pathname.split('/');
    shareCode = pathParts[pathParts.length - 1];
    
    console.log('🔍 Share code:', shareCode);
    
    // Fetch and render DögEar
    async function loadDogear() {
      try {
        console.log('📡 Fetching data...');
        const response = await fetch(`${API_URL}/api/dogears/view/${shareCode}`);
        
        console.log('📡 Response status:', response.status);
        
        if (!response.ok) {
          throw new Error('DögEar not found or expired');
        }
        
        const data = await response.json();
        console.log('✅ Data received:', data);
        
        // Update header
        document.getElementById('username').textContent = `@${data.userName}`;
        document.getElementById('video-count').textContent = `${data.videoCount}/10`;
        
        // Update page title
        const title = `${data.userName}'s DögEar from ${formatDate(data.date)}`;
        document.getElementById('page-title').textContent = title;
        document.getElementById('og-title').setAttribute('content', title);
        document.getElementById('twitter-title').setAttribute('content', title);
        
        const description = `${data.videoCount} videos saved on ${formatDate(data.date)}`;
        document.getElementById('og-description').setAttribute('content', description);
        document.getElementById('twitter-description').setAttribute('content', description);
        
        // Render feed
        renderFeed(data.videos);
        
        // Show content
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        
        // Set App Store link
        const appStoreUrl = 'https://apps.apple.com/us/app/d%C3%B6gear-daily-videos-w-friends/id6756027826';
        document.getElementById('cta-button').href = appStoreUrl;
        document.getElementById('cta-button').onclick = () => trackClick();
        
      } catch (error) {
        console.error('❌ Error:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error-message').textContent = error.message || 'Failed to load DögEar';
      }
    }
    
    function renderFeed(videos) {
      const feed = document.getElementById('feed');
      feed.innerHTML = '';
      
      videos.forEach((video, index) => {
        const card = document.createElement('div');
        card.className = 'video-card';
        
        // Thumbnail
        const thumbnailHtml = video.thumbnail 
          ? `<img src="${video.thumbnail}" alt="${escapeHtml(video.title)}" class="video-thumbnail">`
          : `<div class="placeholder-thumbnail">${getPlatformEmoji(video.platform)}</div>`;
        
        // Platform badge
        const platformIcon = getPlatformEmoji(video.platform);
        
        card.innerHTML = `
          ${thumbnailHtml}
          <div class="video-info">
            <div class="video-header">
              <span class="platform-badge">${platformIcon} ${video.platform}</span>
            </div>
            <div class="video-title">${escapeHtml(video.title || 'Untitled Video')}</div>
            <div class="video-meta">
              <span>📅 ${formatTimeAgo(video)}</span>
            </div>
            <a href="${video.url}" target="_blank" class="watch-btn">
              Watch on ${video.platform}
            </a>
          </div>
        `;
        
        feed.appendChild(card);
      });
    }
    
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', { 
        month: 'long', 
        day: 'numeric', 
        year: 'numeric' 
      });
    }
    
    function formatTimeAgo(video) {
      // Simple "7h ago" style formatting
      return '7h ago'; // You can make this dynamic if needed
    }
    
    function getPlatformEmoji(platform) {
      const lower = platform?.toLowerCase() || '';
      if (lower.includes('tiktok')) return '🎵';
      if (lower.includes('instagram')) return '📸';
      if (lower.includes('youtube')) return '▶️';
      return '🎬';
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    async function trackClick() {
      try {
        await fetch(`${API_URL}/api/dogears/track-click/${shareCode}`, { method: 'POST' });
      } catch (error) {
        console.error('Failed to track click:', error);
      }
    }
    
    // Load on page load
    loadDogear();
  </script>
</body>
</html>
