  </div>

  <script>
    let currentSlide = 0;
    let videos = [];
    let shareCode = '';
    
    // API URL - use production Railway backend
    const API_URL = 'https://api.dogearhq.com';
    
    console.log('🔍 Script loaded');
    console.log('🔍 Current URL:', window.location.href);
    console.log('🔍 Pathname:', window.location.pathname);
    
    // Get share code from URL (/d/abc123)
    const pathParts = window.location.pathname.split('/');
    shareCode = pathParts[pathParts.length - 1];
    
    console.log('🔍 Share code:', shareCode);
    console.log('🔍 API URL:', `${API_URL}/api/dogears/view/${shareCode}`);
    
    // Fetch DögEar data
    async function loadDogear() {
      try {
        console.log('📡 Fetching data...');
        const response = await fetch(`${API_URL}/api/dogears/view/${shareCode}`);
        
        console.log('📡 Response status:', response.status);
        
        if (!response.ok) {
          throw new Error('DögEar not found or expired');
        }
        
        const data = await response.json();
        console.log('✅ Data received:', data);
        
        videos = data.videos;
        
        console.log('📹 Videos:', videos.length);
        
        // Update page title and meta tags
        const title = `${data.userName}'s DögEar from ${formatDate(data.date)}`;
        document.getElementById('page-title').textContent = title;
        document.getElementById('og-title').setAttribute('content', title);
        document.getElementById('twitter-title').setAttribute('content', title);
        
        const description = `${data.videoCount} videos saved on ${formatDate(data.date)}`;
        document.getElementById('og-description').setAttribute('content', description);
        document.getElementById('twitter-description').setAttribute('content', description);
        
        // Update UI
        document.getElementById('user-name').textContent = `${data.userName}'s DögEar 🐶`;
        document.getElementById('date-text').textContent = formatDate(data.date);
        document.getElementById('video-count').textContent = `${data.videoCount} video${data.videoCount > 1 ? 's' : ''}`;
        document.getElementById('view-count').textContent = `${data.viewCount} view${data.viewCount !== 1 ? 's' : ''}`;
        
        // Render carousel
        renderCarousel();
        
        // Show content, hide loading
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        
        // Set App Store link
        const appStoreUrl = 'https://apps.apple.com/app/dogear/id123456789'; // TODO: Replace with real URL
        document.getElementById('cta-button').href = appStoreUrl;
        document.getElementById('cta-button').onclick = () => trackClick();
        
      } catch (error) {
        console.error('❌ Error loading DögEar:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = error.message || 'Failed to load DögEar';
      }
    }
    
    function renderCarousel() {
      const carousel = document.getElementById('carousel');
      const dotsContainer = document.getElementById('dots');
      
      carousel.innerHTML = '';
      dotsContainer.innerHTML = '';
      
      videos.forEach((video, index) => {
        // Create slide
        const slide = document.createElement('div');
        slide.className = 'video-slide';
        if (index === 0) slide.classList.add('active');
        
        // Thumbnail or placeholder
        if (video.thumbnail) {
          const img = document.createElement('img');
          img.src = video.thumbnail;
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.objectFit = 'cover';
          slide.appendChild(img);
        } else {
          const placeholder = document.createElement('div');
          placeholder.className = 'placeholder-thumbnail';
          placeholder.textContent = getPlatformEmoji(video.platform);
          slide.appendChild(placeholder);
        }
        
        // Video info overlay
        const info = document.createElement('div');
        info.className = 'video-info';
        info.innerHTML = `
          <div class="video-title">${escapeHtml(video.title || 'Untitled')}</div>
          <div class="video-platform">${video.platform}</div>
        `;
        slide.appendChild(info);
        
        // View original video button
        const viewBtn = document.createElement('a');
        viewBtn.href = video.url;
        viewBtn.target = '_blank';
        viewBtn.className = 'view-video-btn';
        viewBtn.textContent = `Watch on ${video.platform}`;
        viewBtn.style.position = 'absolute';
        viewBtn.style.top = '50%';
        viewBtn.style.left = '50%';
        viewBtn.style.transform = 'translate(-50%, -50%)';
        viewBtn.style.width = '80%';
        slide.appendChild(viewBtn);
        
        carousel.appendChild(slide);
        
        // Create dot
        const dot = document.createElement('div');
        dot.className = 'dot';
        if (index === 0) dot.classList.add('active');
        dot.onclick = () => goToSlide(index);
        dotsContainer.appendChild(dot);
      });
      
      updateNavButtons();
    }
    
    function goToSlide(index) {
      const slides = document.querySelectorAll('.video-slide');
      const dots = document.querySelectorAll('.dot');
      
      slides[currentSlide].classList.remove('active');
      dots[currentSlide].classList.remove('active');
      
      currentSlide = index;
      
      slides[currentSlide].classList.add('active');
      dots[currentSlide].classList.add('active');
      
      updateNavButtons();
    }
    
    function nextSlide() {
      if (currentSlide < videos.length - 1) {
        goToSlide(currentSlide + 1);
      }
    }
    
    function previousSlide() {
      if (currentSlide > 0) {
        goToSlide(currentSlide - 1);
      }
    }
    
    function updateNavButtons() {
      document.getElementById('prev-btn').disabled = currentSlide === 0;
      document.getElementById('next-btn').disabled = currentSlide === videos.length - 1;
    }
    
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', { 
        month: 'long', 
        day: 'numeric', 
        year: 'numeric' 
      });
    }
    
    function getPlatformEmoji(platform) {
      const lower = platform.toLowerCase();
      if (lower.includes('tiktok')) return '📱';
      if (lower.includes('instagram')) return '📸';
      if (lower.includes('youtube')) return '▶️';
      return '🎬';
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    async function trackClick() {
      try {
        await fetch(`${API_URL}/api/dogears/track-click/${shareCode}`, { method: 'POST' });
      } catch (error) {
        console.error('Failed to track click:', error);
      }
    }
    
    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') previousSlide();
      if (e.key === 'ArrowRight') nextSlide();
    });
    
    // Load on page load
    loadDogear();
  </script>
